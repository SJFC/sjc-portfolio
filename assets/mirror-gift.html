<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated thank-you</title>
<style>
  html, body { margin: 0; background: transparent; overflow: hidden; }
  :root { --space-3: 2rem; }
</style>
</head>
<body>
<!-- ===== The gift: plays once as the thank-you appears, settles as constellation ===== -->
<style>
  .bp-gift { max-width: 560px; margin: var(--space-3) auto 0; }
  .bp-gift svg { width: 100%; height: auto; display: block; }
  .bp-gift .gg-num { font-family: ui-monospace, monospace; font-size: 13px; fill: #2B2B2B; text-anchor: middle; animation: ggnum 28s forwards; }
  .bp-gift .gg-sheet { fill: #F5EFDF; animation: ggsky 28s forwards; }
  .bp-gift .gg-grid { animation: gggrid 28s forwards; }
  .bp-gift .gg-rowfill { fill: #EDE6D6; }
  .bp-gift .gg-line { stroke: #C9BFA5; stroke-width: 0.5; }
  .bp-gift .gg-ground { stroke: #A89B77; stroke-width: 1; }
  .bp-gift .gg-conste { stroke: #E8C97A; stroke-width: 0.6; fill: none; opacity: 0; animation: ggconste 28s forwards; }
  .bp-gift .gg-dot { fill: #E8C97A; opacity: 0; animation: ggconste 28s forwards; }
  .bp-gift .gg-tw1 { animation: ggtw 3.4s 26s infinite; }
  .bp-gift .gg-tw2 { animation: ggtw 4.1s 26s infinite; }
  .bp-gift .gg-tw3 { animation: ggtw 2.9s 26s infinite; }
  .bp-gift .gg-stem { fill: none; stroke-linecap: round; }
  .bp-gift .gg-fall1 { animation: ggfall1 28s forwards; }
  .bp-gift .gg-fall2 { animation: ggfall2 28s forwards; }
  .bp-gift .gg-fall3 { animation: ggfall3 28s forwards; }
  .bp-gift .gg-numf1 { animation: ggnumf1 28s forwards; }
  .bp-gift .gg-numf2 { animation: ggnumf2 28s forwards; }
  .bp-gift .gg-numf3 { animation: ggnumf3 28s forwards; }
  .bp-gift .gg-seed1 { opacity: 0; animation: ggseed1 28s forwards; }
  .bp-gift .gg-seed2 { opacity: 0; animation: ggseed2 28s forwards; }
  .bp-gift .gg-seed3 { opacity: 0; animation: ggseed3 28s forwards; }
  .bp-gift .gg-stem1 { stroke-dasharray: 170; stroke-dashoffset: 170; animation: ggstem1 28s forwards; }
  .bp-gift .gg-stem2 { stroke-dasharray: 150; stroke-dashoffset: 150; animation: ggstem2 28s forwards; }
  .bp-gift .gg-stem3 { stroke-dasharray: 34; stroke-dashoffset: 34; animation: ggstem3 28s forwards; }
  .bp-gift .gg-grow { transform: scale(0); }
  .bp-gift .gg-basal1 { animation: ggbasal1 28s forwards; }
  .bp-gift .gg-bloom1 { animation: ggbloom1 28s forwards; }
  .bp-gift .gg-leaf2 { animation: ggleaf2 28s forwards; }
  .bp-gift .gg-bloom2 { animation: ggbloom2 28s forwards; }
  .bp-gift .gg-whA { animation: ggwhA 28s forwards; }
  .bp-gift .gg-whB { animation: ggwhB 28s forwards; }
  .bp-gift .gg-whC { animation: ggwhC 28s forwards; }
  .bp-gift .gg-whD { animation: ggwhD 28s forwards; }
  .bp-gift .gg-whE { animation: ggwhE 28s forwards; }
  .bp-gift .gg-wf1 { animation: ggwf1 28s forwards; }
  .bp-gift .gg-wf2 { animation: ggwf2 28s forwards; }

  @keyframes ggsky { 0%,74% { fill: #F5EFDF; } 92%,100% { fill: #221226; } }
  @keyframes gggrid { 0%,74% { opacity: 1; } 92%,100% { opacity: 0.08; } }
  @keyframes ggnum { 0%,10% { fill: #2B2B2B; opacity: 1; } 13%,33% { opacity: 0.7; } 37%,57% { opacity: 0.5; } 62%,84% { opacity: 0.28; } 92%,100% { fill: #E8C97A; opacity: 1; } }
  @keyframes ggconste { 0%,90% { opacity: 0; } 100% { opacity: 0.55; } }
  @keyframes ggtw { 0% { opacity: 1; } 50% { opacity: 0.45; } 100% { opacity: 1; } }
  @keyframes ggfall1 { 0%,4% { transform: translate(0,0); } 6.5% { transform: translate(7px,120px); } 9% { transform: translate(-6px,230px); } 11%,100% { transform: translate(2px,308px); } }
  @keyframes ggnumf1 { 0%,5% { opacity: 1; } 9%,100% { opacity: 0; } }
  @keyframes ggseed1 { 0%,5% { opacity: 0; fill: #2B2B2B; } 7.5% { opacity: 1; fill: #46331F; } 11% { opacity: 1; fill: #6B4A2F; } 13% { opacity: 1; } 15%,100% { opacity: 0; fill: #6B4A2F; } }
  @keyframes ggstem1 { 0%,13% { stroke-dashoffset: 170; } 25%,100% { stroke-dashoffset: 0; } }
  @keyframes ggbasal1 { 0%,14% { transform: scale(0); } 21%,100% { transform: scale(1); } }
  @keyframes ggbloom1 { 0%,22% { transform: scale(0); } 27% { transform: scale(1.1); } 29%,100% { transform: scale(1); } }
  @keyframes ggfall2 { 0%,28% { transform: translate(0,0); } 30% { transform: translate(6px,105px); } 32.5% { transform: translate(-5px,205px); } 35%,100% { transform: translate(2px,276px); } }
  @keyframes ggnumf2 { 0%,29% { opacity: 1; } 33%,100% { opacity: 0; } }
  @keyframes ggseed2 { 0%,29% { opacity: 0; fill: #2B2B2B; } 31% { opacity: 1; fill: #46331F; } 35% { opacity: 1; fill: #6B4A2F; } 37% { opacity: 1; } 39%,100% { opacity: 0; fill: #6B4A2F; } }
  @keyframes ggstem2 { 0%,37% { stroke-dashoffset: 150; } 46%,100% { stroke-dashoffset: 0; } }
  @keyframes ggleaf2 { 0%,39% { transform: scale(0); } 45%,100% { transform: scale(1); } }
  @keyframes ggbloom2 { 0%,45% { transform: scale(0); } 50% { transform: scale(1.1); } 52%,100% { transform: scale(1); } }
  @keyframes ggfall3 { 0%,49% { transform: translate(0,0); } 51% { transform: translate(6px,95px); } 53.5% { transform: translate(-5px,180px); } 56%,100% { transform: translate(1px,244px); } }
  @keyframes ggnumf3 { 0%,50% { opacity: 1; } 54%,100% { opacity: 0; } }
  @keyframes ggseed3 { 0%,50% { opacity: 0; fill: #2B2B2B; } 52% { opacity: 1; fill: #46331F; } 56% { opacity: 1; fill: #6B4A2F; } 58% { opacity: 1; } 60%,100% { opacity: 0; fill: #6B4A2F; } }
  @keyframes ggstem3 { 0%,58% { stroke-dashoffset: 34; } 63%,100% { stroke-dashoffset: 0; } }
  @keyframes ggwhA { 0%,60% { transform: scale(0); } 66%,100% { transform: scale(1); } }
  @keyframes ggwhB { 0%,64% { transform: scale(0); } 70%,100% { transform: scale(1); } }
  @keyframes ggwhC { 0%,68% { transform: scale(0); } 74%,100% { transform: scale(1); } }
  @keyframes ggwhD { 0%,72% { transform: scale(0); } 78%,100% { transform: scale(1); } }
  @keyframes ggwhE { 0%,76% { transform: scale(0); } 82%,100% { transform: scale(1); } }
  @keyframes ggwf1 { 0%,66% { transform: scale(0); } 70% { transform: scale(1.2); } 72%,100% { transform: scale(1); } }
  @keyframes ggwf2 { 0%,78% { transform: scale(0); } 82% { transform: scale(1.2); } 84%,100% { transform: scale(1); } }

  @media (prefers-reduced-motion: reduce) {
    .bp-gift * { animation: none !important; }
    .bp-gift .gg-sheet { fill: #221226; }
    .bp-gift .gg-grid { opacity: 0.08; }
    .bp-gift .gg-num { fill: #E8C97A; opacity: 1; }
    .bp-gift .gg-conste, .bp-gift .gg-dot { opacity: 0.55; }
    .bp-gift .gg-stem { stroke-dashoffset: 0 !important; }
    .bp-gift .gg-grow { transform: scale(1) !important; }
    .bp-gift .gg-fall1, .bp-gift .gg-fall2, .bp-gift .gg-fall3 { display: none; }
  }
</style>
